# XcodeGen project definition. Run `xcodegen generate` to produce
# EveryByteCounts.xcodeproj, then open it in Xcode.
#
# Why XcodeGen: an iOS app + widget extension needs an .xcodeproj, but a
# hand-written project.pbxproj is fragile and noisy in diffs. This declarative
# spec assembles the three pieces from the design (§4) — the app, the widget
# extension, and the shared MobileDataCore package — into a buildable project.
name: EveryByteCounts

options:
  bundleIdPrefix: fi.mailhub.everybytecounts
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# The Shared Core lives in this repo as a local Swift package; both targets link it.
packages:
  MobileDataCore:
    path: .

settings:
  base:
    MARKETING_VERSION: "1.0.7"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # set your Apple Developer team id before signing

targets:
  EveryByteCounts:
    type: application
    platform: iOS
    sources:
      - App/EveryByteCounts
    entitlements:
      path: App/EveryByteCounts/EveryByteCounts.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.mailhub.everybytecounts
        INFOPLIST_FILE: App/EveryByteCounts/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: MobileDataCore
        product: MobileDataCore
      - target: EveryByteCountsWidgetExtension
    scheme: {}

  EveryByteCountsWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - Widget/EveryByteCountsWidget
    entitlements:
      path: Widget/EveryByteCountsWidget/EveryByteCountsWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.mailhub.everybytecounts.widget
        INFOPLIST_FILE: Widget/EveryByteCountsWidget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: MobileDataCore
        product: MobileDataCore

name: Build & Release

# Trigger by pushing a version tag: git tag v1.0.0 && git push origin v1.0.0
# Also callable from ci.yml / bump-version.yml via workflow_call.
on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write  # needed to commit project.yml's version bump and create the GH release

jobs:
  release:
    name: Sign & upload to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.tag }}"
          fi
          VERSION_NUM="${TAG#v}"
          echo "TAG=$TAG"                 >> "$GITHUB_ENV"
          echo "VERSION_NUM=$VERSION_NUM" >> "$GITHUB_ENV"

      - name: Find previous tag
        run: |
          PREV_TAG=$(git describe --abbrev=0 --tags HEAD~1 2>/dev/null || git describe --abbrev=0 --tags 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_ENV"

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "${{ env.PREV_TAG }}" ]; then
            CHANGELOG="(initial release)"
          else
            CHANGELOG=$(gh api repos/${{ github.repository }}/compare/${{ env.PREV_TAG }}...${{ env.TAG }} \
              --jq '.commits | reverse | .[] | "• \(.commit.message | split("\n")[0]) (\(.author.login // .commit.author.name))"' \
              2>/dev/null || echo "")
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG=$(git log ${{ env.PREV_TAG }}..${{ env.TAG }} --pretty="• %s (%an)" 2>/dev/null || echo "(no changes detected)")
            fi
          fi
          echo "CHANGELOG<<EOF" >> "$GITHUB_ENV"
          echo "${CHANGELOG:-"(no changes detected)"}" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          sed -i "" "s/MARKETING_VERSION: \"[^\"]*\"/MARKETING_VERSION: \"${VERSION_NUM}\"/" project.yml
          xcodegen generate

      # Fail fast with a clear message if the signing secrets aren't visible.
      # The classic trap: when this workflow runs via workflow_call, the caller
      # must forward secrets with `secrets: inherit` — otherwise every secret
      # silently expands to "" and xcodebuild dies with a cryptic flag error.
      - name: Verify signing secrets are present
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APPLE_DIST_CERT_P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          APPLE_DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          missing=()
          [ -n "$APPLE_TEAM_ID" ]                || missing+=(APPLE_TEAM_ID)
          [ -n "$APP_STORE_CONNECT_KEY_ID" ]     || missing+=(APP_STORE_CONNECT_KEY_ID)
          [ -n "$APP_STORE_CONNECT_ISSUER_ID" ]  || missing+=(APP_STORE_CONNECT_ISSUER_ID)
          [ -n "$APP_STORE_CONNECT_API_KEY_P8" ] || missing+=(APP_STORE_CONNECT_API_KEY_P8)
          [ -n "$APPLE_DIST_CERT_P12_BASE64" ]   || missing+=(APPLE_DIST_CERT_P12_BASE64)
          [ -n "$APPLE_DIST_CERT_PASSWORD" ]     || missing+=(APPLE_DIST_CERT_PASSWORD)
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing secrets: ${missing[*]}. Add them under Settings → Secrets and variables → Actions; if this run came through workflow_call, ensure the caller uses 'secrets: inherit'."
            exit 1
          fi

      # App Store Connect API key auth (no Apple ID/password/2FA in CI). The key
      # itself is the only long-lived secret; it's scoped, revocable, and never
      # touches the repo. xcodebuild reads it from this well-known path.
      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          AUTH_KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$AUTH_KEY_PATH"
          echo "AUTH_KEY_PATH=$AUTH_KEY_PATH" >> "$GITHUB_ENV"

      # Distribution signing uses a locally imported Apple Distribution
      # certificate (.p12 secret) in a throwaway keychain. Cloud-MANAGED
      # distribution certificates would need an Admin-role API key ("Cloud
      # signing permission error" otherwise); with the cert present locally,
      # automatic signing uses it and the App Manager key only has to
      # create/download provisioning profiles, which it is allowed to do.
      # The keychain is deleted in a post step and the runner is ephemeral.
      - name: Install distribution certificate into temp keychain
        env:
          APPLE_DIST_CERT_P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          APPLE_DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          P12_PATH="$RUNNER_TEMP/dist.p12"

          printf '%s' "$APPLE_DIST_CERT_P12_BASE64" | base64 --decode > "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -f pkcs12
          # Allow codesign to use the key without a UI password prompt.
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$P12_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          # Sanity check: fail here with a readable message rather than deep
          # inside xcodebuild if the p12 didn't contain a signing identity.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Apple Distribution" \
            || { echo "::error::No 'Apple Distribution' identity found in the imported .p12"; exit 1; }

      # The API key still handles development signing during archive and the
      # provisioning profile fetch/creation at export. CURRENT_PROJECT_VERSION
      # uses the run number so build numbers are always unique and
      # monotonically increasing across uploads of the same version.
      - name: Build archive (App Store signed)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project EveryByteCounts.xcodeproj \
            -scheme EveryByteCounts \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/EveryByteCounts.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            MARKETING_VERSION="${VERSION_NUM}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      # destination=upload makes xcodebuild push the exported IPA straight to
      # App Store Connect in the same step — no separate altool/Transporter call.
      - name: Export & upload to App Store Connect (TestFlight)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>destination</key>
              <string>upload</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/EveryByteCounts.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Delete temp keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - name: Commit project.yml version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch origin main
          git checkout main
          # Keep project.yml in sync so local builds produce the right version
          sed -i "" "s/MARKETING_VERSION: \"[^\"]*\"/MARKETING_VERSION: \"${VERSION_NUM}\"/" project.yml
          git add project.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # [skip ci] avoids a needless macOS run; a lone chore commit is
            # non-releasable anyway so it could never trigger another release.
            git commit -m "chore: bump project.yml version to ${TAG} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: "Every Byte Counts ${{ env.VERSION_NUM }}"
          body: |
            ## Changes since ${{ env.PREV_TAG }}

            ${{ env.CHANGELOG }}

            ---

            Build `${{ env.VERSION_NUM }} (${{ github.run_number }})` uploaded to
            [TestFlight](https://appstoreconnect.apple.com/). Once Apple finishes
            processing (usually 5-15 min), it's available to internal testers
            immediately, or to external testers after Beta App Review.

name: Build & Release

# Trigger by pushing a version tag: git tag v1.0.0 && git push origin v1.0.0
# Also callable from ci.yml / bump-version.yml via workflow_call.
on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true
        type: string

# Serialize releases: never run two at once (racing TestFlight build numbers or
# racing version-bump commits to main). cancel-in-progress: false so an in-flight
# upload is queued behind, never killed mid-way.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Sign, build, upload (needs macOS) ──────────────────────────────────────
  build:
    name: Sign & upload to TestFlight
    runs-on: macos-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version_num: ${{ steps.version.outputs.version_num }}
    env:
      # fastlane (match, gym, pilot) reads all of these. Signing is fully
      # managed by match — no keychains, .p12s, or hand-minted profiles here.
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.tag }}"
          fi
          VERSION_NUM="${TAG#v}"
          echo "tag=$TAG"                 >> "$GITHUB_OUTPUT"
          echo "version_num=$VERSION_NUM" >> "$GITHUB_OUTPUT"
          # fastlane stamps this into the build (see build_signed_ipa).
          echo "MARKETING_VERSION=$VERSION_NUM" >> "$GITHUB_ENV"

      # Fail fast with a clear message if the signing secrets aren't visible.
      # The classic trap: when this workflow runs via workflow_call, the caller
      # must forward secrets with `secrets: inherit` — otherwise every secret
      # silently expands to "" and fastlane dies with a cryptic error.
      - name: Verify signing secrets are present
        run: |
          missing=()
          [ -n "$APPLE_TEAM_ID" ]                || missing+=(APPLE_TEAM_ID)
          [ -n "$APP_STORE_CONNECT_KEY_ID" ]     || missing+=(APP_STORE_CONNECT_KEY_ID)
          [ -n "$APP_STORE_CONNECT_ISSUER_ID" ]  || missing+=(APP_STORE_CONNECT_ISSUER_ID)
          [ -n "$APP_STORE_CONNECT_API_KEY_P8" ] || missing+=(APP_STORE_CONNECT_API_KEY_P8)
          [ -n "$MATCH_PASSWORD" ]               || missing+=(MATCH_PASSWORD)
          [ -n "$MATCH_GIT_URL" ]                || missing+=(MATCH_GIT_URL)
          [ -n "${{ secrets.MATCH_REPO_KEY }}" ] || missing+=(MATCH_REPO_KEY)
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing secrets: ${missing[*]}. Add them under Settings → Secrets and variables → Actions; if this run came through workflow_call, ensure the caller uses 'secrets: inherit'. See docs/FASTLANE-MIGRATION.md."
            exit 1
          fi

      # Read-only SSH deploy key so match can `git clone` the private signing repo.
      - name: Load match repo SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_REPO_KEY }}

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Set up Ruby + bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Sync signing (match), archive, re-assert declared entitlements Xcode
      # strips, export, and upload to TestFlight — all in the beta lane.
      - name: Build & upload to TestFlight
        run: bundle exec fastlane beta

  # ── Changelog, version bump, GitHub Release (git-only, cheap ubuntu) ────────
  # Runs only after a successful upload, so a failed build never bumps the
  # version or publishes a release.
  publish:
    name: Changelog, version bump & GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ needs.build.outputs.tag }}
      VERSION_NUM: ${{ needs.build.outputs.version_num }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find previous tag
        run: |
          PREV_TAG=$(git describe --abbrev=0 --tags HEAD~1 2>/dev/null || git describe --abbrev=0 --tags 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_ENV"

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "${{ env.PREV_TAG }}" ]; then
            CHANGELOG="(initial release)"
          else
            CHANGELOG=$(gh api repos/${{ github.repository }}/compare/${{ env.PREV_TAG }}...${{ env.TAG }} \
              --jq '.commits | reverse | .[] | "• \(.commit.message | split("\n")[0]) (\(.author.login // .commit.author.name))"' \
              2>/dev/null || echo "")
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG=$(git log ${{ env.PREV_TAG }}..${{ env.TAG }} --pretty="• %s (%an)" 2>/dev/null || echo "(no changes detected)")
            fi
          fi
          echo "CHANGELOG<<EOF" >> "$GITHUB_ENV"
          echo "${CHANGELOG:-"(no changes detected)"}" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Commit project.yml version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch origin main
          git checkout main
          # GNU sed (ubuntu) — keep project.yml in sync so local builds produce
          # the right version.
          sed -i "s/MARKETING_VERSION: \"[^\"]*\"/MARKETING_VERSION: \"${VERSION_NUM}\"/" project.yml
          git add project.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # [skip ci] avoids a needless macOS run; a lone chore commit is
            # non-releasable anyway so it could never trigger another release.
            git commit -m "chore: bump project.yml version to ${TAG} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: "Every Byte Counts ${{ env.VERSION_NUM }}"
          body: |
            ## Changes since ${{ env.PREV_TAG }}

            ${{ env.CHANGELOG }}

            ---

            Build `${{ env.VERSION_NUM }} (${{ github.run_number }})` uploaded to
            [TestFlight](https://appstoreconnect.apple.com/). Once Apple finishes
            processing (usually 5-15 min), it's available to internal testers
            immediately, or to external testers after Beta App Review.

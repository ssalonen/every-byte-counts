name: Build & Release

# Trigger by pushing a version tag: git tag v1.0.0 && git push origin v1.0.0
# Also callable from ci.yml / bump-version.yml via workflow_call.
on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write  # needed to push altstore-source.json and create the release

jobs:
  release:
    name: Build & Release IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.tag }}"
          fi
          VERSION_NUM="${TAG#v}"
          echo "TAG=$TAG"                 >> "$GITHUB_ENV"
          echo "VERSION_NUM=$VERSION_NUM" >> "$GITHUB_ENV"

      - name: Find previous tag
        run: |
          PREV_TAG=$(git describe --abbrev=0 --tags HEAD~1 2>/dev/null || git describe --abbrev=0 --tags 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_ENV"

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "${{ env.PREV_TAG }}" ]; then
            CHANGELOG="(initial release)"
          else
            CHANGELOG=$(gh api repos/${{ github.repository }}/compare/${{ env.PREV_TAG }}...${{ env.TAG }} \
              --jq '.commits | reverse | .[] | "• \(.commit.message | split("\n")[0]) (\(.author.login // .commit.author.name))"' \
              2>/dev/null || echo "")
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG=$(git log ${{ env.PREV_TAG }}..${{ env.TAG }} --pretty="• %s (%an)" 2>/dev/null || echo "(no changes detected)")
            fi
          fi
          echo "CHANGELOG<<EOF" >> "$GITHUB_ENV"
          echo "${CHANGELOG:-"(no changes detected)"}" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive (ad-hoc signed)
        run: |
          xcodebuild archive \
            -project EveryByteCounts.xcodeproj \
            -scheme EveryByteCounts \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/EveryByteCounts.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            MARKETING_VERSION="${VERSION_NUM}" \
            CURRENT_PROJECT_VERSION="${VERSION_NUM}"

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/EveryByteCounts.xcarchive/Products/Applications" -name "*.app" | head -1)
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r EveryByteCounts.ipa Payload/
          echo "IPA_PATH=$RUNNER_TEMP/EveryByteCounts.ipa" >> "$GITHUB_ENV"
          echo "IPA_SIZE=$(wc -c < EveryByteCounts.ipa | tr -d ' ')" >> "$GITHUB_ENV"

      - name: Update altstore-source.json
        run: |
          export DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/EveryByteCounts.ipa"
          export DATE="$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")"

          python3 - <<'PYEOF'
          import json, os, shutil

          version_num  = os.environ["VERSION_NUM"]
          ipa_size     = int(os.environ["IPA_SIZE"])
          download_url = os.environ["DOWNLOAD_URL"]
          date         = os.environ["DATE"]

          with open("altstore-source.json") as f:
              source = json.load(f)

          app = source["apps"][0]

          new_entry = {
              "version": version_num,
              "date": date,
              "localizedDescription": "See GitHub release notes.",
              "downloadURL": download_url,
              "size": ipa_size,
              "minOSVersion": "17.0",
          }

          app["versions"] = [v for v in app.get("versions", []) if v["version"] != version_num]
          app["versions"].insert(0, new_entry)

          # Top-level fields SideStore/AltStore read to find the latest version.
          app["version"] = version_num
          app["versionDate"] = date
          app["versionDescription"] = "See GitHub release notes."
          app["downloadURL"] = download_url
          app["size"] = ipa_size

          with open("altstore-source.json", "w") as f:
              json.dump(source, f, indent=2)
              f.write("\n")
          shutil.copy("altstore-source.json", os.path.join(os.environ["RUNNER_TEMP"], "altstore-source.json"))

          print(f"Updated source to {version_num} ({ipa_size} bytes)")
          PYEOF

      - name: Commit updated source JSON and project version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch origin main
          git checkout main
          cp "$RUNNER_TEMP/altstore-source.json" altstore-source.json
          # Keep project.yml in sync so local builds produce the right version
          sed -i "" "s/MARKETING_VERSION: \"[^\"]*\"/MARKETING_VERSION: \"${VERSION_NUM}\"/" project.yml
          git add altstore-source.json project.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # [skip ci] avoids a needless macOS run; a lone chore commit is
            # non-releasable anyway so it could never trigger another release.
            git commit -m "chore: update AltStore source and version for ${TAG} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: "Every Byte Counts ${{ env.VERSION_NUM }}"
          body: |
            ## Changes since ${{ env.PREV_TAG }}

            ${{ env.CHANGELOG }}

            ---

            ## Install via SideStore / AltStore

            **Add this source URL in SideStore/AltStore:**
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/altstore-source.json
            ```

            Or [download the IPA directly](https://github.com/${{ github.repository }}/releases/download/${{ env.TAG }}/EveryByteCounts.ipa) and open it in SideStore/AltStore.

            ---
            *Unsigned build — SideStore/AltStore will sign it with your Apple ID on install.*
          files: ${{ env.IPA_PATH }}
          fail_on_unmatched_files: true
